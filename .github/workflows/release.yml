name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build_and_release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.x"

      - name: Set Version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Fetch YMM4 Build Libraries
        shell: pwsh
        run: |
          ./scripts/fetch-ymm4-libs.ps1 -OutputDir "libs/YMM4"

      - name: Build
        run: dotnet build .\YMMProjectManager.sln -c Release -p:Version=$env:VERSION -p:YMM4_PATH="${{ github.workspace }}\libs\YMM4"

      - name: Prepare Publish Folder
        run: |
          if (Test-Path publish) { Remove-Item publish -Recurse -Force }
          New-Item -ItemType Directory -Path publish

      - name: Copy LICENSE
        run: Copy-Item "LICENSE" "publish\LICENSE"

      - name: Copy README
        run: Copy-Item "README.md" "publish\readme.txt"

      - name: Collect Plugin Files
        shell: pwsh
        run: |
          $pluginBin = "YMMProjectManager\bin\Release\net10.0-windows"
          $requiredFiles = @(
            "YMMProjectManager.dll",
            "YMMProjectManager.deps.json"
          )

          foreach ($file in $requiredFiles) {
            $src = Join-Path $pluginBin $file
            if (!(Test-Path $src)) {
              throw "Required file not found: $src"
            }
            Copy-Item $src "publish\$file" -Force
          }

          $pdb = Join-Path $pluginBin "YMMProjectManager.pdb"
          if (Test-Path $pdb) {
            Copy-Item $pdb "publish\YMMProjectManager.pdb" -Force
          }

      - name: Prepare Package Folder
        run: |
          if (Test-Path package) { Remove-Item package -Recurse -Force }
          New-Item -ItemType Directory -Path package
          Copy-Item publish\* package -Recurse

      - name: Create ZIP
        run: Compress-Archive -Path "package\*" -DestinationPath "YMMProjectManager.zip"

      - name: Rename ZIP to .ymme
        run: Move-Item YMMProjectManager.zip YMMProjectManager.ymme

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          artifacts: YMMProjectManager.ymme
          draft: true
          prerelease: true
